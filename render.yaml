# Render Blueprint — deploy backend, frontend, and Postgres from one file.
# Docs: https://render.com/docs/blueprint-spec
#
# Default URLs use each service's `name` (*.onrender.com). If Render assigns
# different hostnames, update CORS_ORIGIN + VITE_API_URL in the Dashboard and
# redeploy the static site (VITE_* is baked in at build time).

services:
  - type: web
    name: salary-mgmt-api
    runtime: docker
    autoDeployTrigger: off
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: salary-mgmt-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://salary-mgmt-web.onrender.com
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: "3000"

  # Static sites have no instance plan (always included on Hobby); do not set `plan`.
  - type: web
    name: salary-mgmt-web
    runtime: static
    autoDeployTrigger: off
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://salary-mgmt-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: salary-mgmt-db
    plan: free
    databaseName: app
    user: app
